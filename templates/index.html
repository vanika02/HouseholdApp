<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Household services</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link href="https://fonts.googleapis.com/css?family=Montserrat:500,700" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header id="header">
      <div class="logo-toggle-flex">
        <div class="logo">
          <img id="header-img" src="{{ url_for('static', filename='images/HouseHold.png') }}" alt="Household logo" title="Household Services">
          <span class="logo-text">Household Services</span>
        </div>
        <a href="#nav-bar"
         id="menu-toggle"
         class="menu-toggle"><span class="fas fa-bars fa-lg"></span>
        </a>
      </div>
      <nav class="nav-bar-wrapper" id="nav-bar">
        <a href="#main-menu-toggle"
           id="main-menu-close"
           class="menu-close"><span class="fas fa-times fa-lg"></span>
        </a>
        <ul class="menu-wrapper" id="menu-wrapper">
          <li><a href="{{url_for('cust_register')}}" class="nav-link">Register as User</a></li>
          <li><a href="{{url_for('prof_register')}}" class="nav-link">Register as Professional</a></li>
        </ul>
      </nav>
      <a href="#main-menu-toggle"
         class="backdrop"></a>
    </header>
    <main>

      <!--  CTA  -->
      <section class="cta-img" id="cta-img">
        <div class="cta-banner">
          <div class="cta-wrapper">
            <h1>Welcome to Household Service</h1>
            <h2>Register or login to continue to get the best service.</h2>
            <a href="{{url_for('login')}}" class="quote">Login</a>
          </div><!--   end cta-wrapper     -->
        </div><!--   end cta-banner     -->
      </section>
    </main>
    <footer>
      <div id="footer">Created by Vanika Dangi || HouseHold service</div>
    </footer>
  </body>
</html>


<style>
/* Global */
* {
  box-sizing: border-box;
}

html, body {
  font: 700 62.5% 'Montserrat', sans-serif;
  height: 100%;
  margin: 0;
  padding: 0;
  width: 100%;
}

body {
  line-height: 1.2;
}

a {
  display: inline-block;
  text-align: center;
  text-decoration: none;
  text-transform: uppercase;
}

main, section {
  width: 100%;
}

section {
  padding: 3%;
}

main {
  margin-top: 5.5rem;
}

img {
  vertical-align: middle;
}

hr {
  border-color: #4E5254;
  width: 10rem;
}

h1, h2 {
  text-transform: uppercase;
}

h1, h2, h3 {
  text-align: center;
}

h1 { font-size: 2.8rem; }
h2 { font-size: 2.5rem; }
h3 { font-size: 2.2rem; }
a { font-size: 1.5rem; }
p, li { font-size: 1.9rem; }
cite { font-size: 1.7rem; }

li, cite { font-weight: 500; }

/* Header */
.fas {
  color: #4E5254;
  padding-right: 1rem;
}

#header-img {
  padding: 0.5rem;
}

.logo-text {
  font-size: 1.5rem;
  vertical-align: middle;
  color: #4E5254;
  text-transform: uppercase;
}

#header {
  position: fixed;
  height: 5.5rem;
  top: 0;
  left: 0;
  right: 0;
  background-color: #EAE2DF;
}

.logo-toggle-flex {
  display: flex;
  justify-content: space-between;
}

.nav-bar-wrapper {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  position: absolute;
  right: -300px;
  top: 0;
  height: 100%;
  overflow-y: scroll;
  overflow-x: visible;
  transition: left 0.3s ease,
              box-shadow 0.3s ease;
  z-index: 999;
}

.menu-toggle {
  align-self: center;
}

.nav-bar-wrapper ul {
  margin: 0;
  padding: 2.5rem 0 0;
  min-height: 100%;
  width: 20rem;
  background: #E79744;
}

.menu-wrapper li {
  border-bottom: 1px solid rgba(255,255,255,.5);
  padding: 1.5rem;
}

.menu-wrapper a {
  color: white;
  border: none;
}

.menu-close {
  position: absolute;
  right: 0;
  top: 0;
}

.nav-bar-wrapper:target {
  right: 0;
}

.nav-bar-wrapper:target .menu-close {
  z-index: 1001;
}

.nav-bar-wrapper:target ul {
  position: relative;
  z-index: 1000;
}

.nav-bar-wrapper:target + .backdrop {
  position: absolute;
  display: block;
  content: "";
  right: 0;
  top: 0;
  width: 100%;
  height: 100%;
  z-index: 998;
  background: rgba(0,0,0,.5);
  cursor: default;
}

@supports (position: fixed) {
  .nav-bar-wrapper,
  .nav-bar-wrapper:target + .backdrop {
    position: fixed;
  }
}

/* CTA */
.cta-img {
  background: url("{{ url_for('static', filename='images/window.svg') }}") 0 0 / 100% no-repeat;
  display: flex;
  flex-direction: column;
  height: 100vh;
  justify-content: space-around;
  width: 100%;
}

.cta-banner {
  align-self: flex-end;
  display: flex;
  flex-direction: column;
  justify-content: right;
  width: fit-content;
}

.cta-wrapper {
  align-items: center;
  align-self: center;
  display: flex;
  flex-direction: column;
}

.cta-wrapper h1,
.cta-wrapper h2 {
  padding: 1%;
  width: 100%;
}

.cta-wrapper h1 {
  color: #E79744;
  margin-bottom: 1%;
}

.cta-wrapper h2 {
  color:Gray;
  font-size: 1.8rem;
  margin-bottom: 5%;
  text-transform: none;
}

.cta-wrapper a {
  align-self: center;
  background-color: #E79744;
  border-radius: 3rem;
  color: #F2F2F2;
  font-size: 1.8rem;
  padding: 2rem 1.5rem;
  text-align: center;
  width: 20rem;
}

#footer {
  background-color: #4E5254;
  color: #F2F2F2;
  font-size: 1.2rem;
  padding: 1.5rem;
  text-align: center;
}

/* Responsive */
@media (min-width: 920px) {
  /*  remove toggle and display menu  */
  .menu-toggle,
  .menu-close {
    display: none;
  }
  .nav-bar-wrapper {
    display: inline-flex;
    position: relative;
    right: auto;
    top: auto;
    height: auto;
    overflow: initial;
  }
  .menu-wrapper {
    display: flex;
    flex-direction: row;
    justify-content: space-around;
  }
  .nav-bar-wrapper ul {
    display: flex;
    padding: 0;
    box-shadow: none;
    height: auto;
    width: auto;
    background: none;
  }
  #header {
    display: flex;
  }
  .logo-toggle-flex {
    margin-right: auto;
  }
  .menu-wrapper li {
    align-self: center;
    border: none;
  }
  .menu-wrapper a {
    color: #4E5254;
    font-weight: 700;
  }
}

</style>
