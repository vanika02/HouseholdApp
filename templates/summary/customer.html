
<div>
    <div style="margin-top: 50px; text-align: center;">
      <h1>Service Request status</h1>
    <canvas id="statusChart" width="600" height="400"></canvas>
  </div>
  
  <style>
    #statusChart {
      max-width: 600px;
      max-height: 400px;
      margin: 0 auto;
      display: block;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Bar Chart for Service Request Statuses
    const statusCtx = document.getElementById('statusChart');
    const statusLabels = JSON.parse('{{ status_labels | tojson | safe }}');
    const statusValues = JSON.parse('{{ status_values | tojson | safe }}');
  
    new Chart(statusCtx, {
      type: 'bar',
      data: {
        labels: statusLabels,
        datasets: [{
          label: 'Number of Service Requests',
          data: statusValues,
          backgroundColor: [
            'rgba(255, 99, 132, 0.2)', // Pending
            'rgba(54, 162, 235, 0.2)', // Accepted
            'rgba(75, 192, 192, 0.2)', // Completed
            'rgba(153, 102, 255, 0.2)', // Closed
          ],
          borderColor: [
            'rgba(255, 99, 132, 1)',
            'rgba(54, 162, 235, 1)',
            'rgba(75, 192, 192, 1)',
            'rgba(153, 102, 255, 1)',
          ],
          borderWidth: 1,
        }],
      },
      options: {
        scales: {
          y: {
            beginAtZero: true,
          },
        },
      },
    });
</script>
<div style="margin-top: 50px; text-align: center;">
  <!-- Back to Dashboard Button -->
  <a href="{{ url_for('customer_dashboard') }}">
      <button style="padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">
          Back to Dashboard
      </button>
  </a>
</div>
