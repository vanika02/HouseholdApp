{% extends 'layout.html' %}

{% block title %}
    Delete Service
{% endblock %}

{% block content %}
<h1 class="display-1">
    Delete Service
</h1>
<p class="f-3">Are you sure you want to delete {{service.name}}</p>

<form action="{{ url_for('add_service') }}" method="POST" class="form">
    <div class="form-group">
        <button type="submit" class="btn btn-danger">
            <i class="fas fa-trash"></i>
            Delete
        </button>
    </div>
</form>

{% endblock %}
