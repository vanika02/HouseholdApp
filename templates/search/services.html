<!-- templates/search/services.html -->
{% if services %}
    <h2 class="display-2">Services:</h2>
    <table class="table">
        <thead>
            <tr>
                <th>Service ID</th>
                <th>Service Name</th>
                <th>No of Professionals</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for service in services %}
            <tr>
                <td>{{ service.id }}</td>
                <td>{{ service.name }}</td>
                <td>{{ service.professionals | length }}</td>
                <td>
                    <a href="{{ url_for('show_service', id=service.id) }}" class="btn btn-primary">
                        <i class="fas fa-search"></i> Show
                    </a>
                    <a href="{{ url_for('edit_service', id=service.id) }}" class="btn btn-primary">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    <a href="{{ url_for('delete_service', id=service.id) }}" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p>No services found.</p>
{% endif %}
