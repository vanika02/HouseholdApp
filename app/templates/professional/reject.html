{% extends 'layout.html' %}

{% block title %}
    Delete Service
{% endblock %}

{% block content %}
<h1 class="display-1">
    Reject Professional
</h1>
<p class="f-3">Are you sure you want to reject {{professional.fullname}}</p>

<form action="{{ url_for('reject_professional', id=professional.id)}}" method="POST" class="form">
    <div class="form-group">
        <button type="submit" class="btn btn-danger">
            <i class="fas fa-trash"></i>
            Reject
        </button>
    </div>
</form>

{% endblock %}
