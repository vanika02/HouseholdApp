{% with messages = get_flashed_messages() %}
{% if messages %}
        {% for message in messages %}
        {% if 'success' in messages | lower %}
            <div class="alert alert-success" role="alert">
                {{ message }}
            </div>
        {% else %}   
        <div class="alert alert-danger" role="alert">
            {{ message }}
        </div>
        {% endif %}
        {% endfor %}
    </div>
{% endif %}

{% endwith %}
