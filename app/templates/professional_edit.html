{% extends 'layout.html' %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<h2>Edit profile</h2>

<div class="form-group">
    <form method="POST" class="form-group"
        action="{{url_for('professional.edit_professional', professional=professional, user=user)}}">

        <label for="username" class="form-label">Username:</label>
        <input type="email" class="form-control" id="username" name="username" value="{{ user.username }}" readonly>

        <label for="email" class="form-label">Email:</label>
        <input type="email" class="form-control" id="email" name="email" value="{{ professional.email_id }}" required>

        <label for="address" class="form-label">Address:</label>
        <input type="text" class="form-control" id="address" name="address" value="{{ professional.address }}" required>

        <label for="pin_code" class="form-label">Pin Code:</label>
        <input type="text" class="form-control" id="pin_code" name="pin_code" value="{{ professional.pin_code }}"
            required>

        <label for="description" class="form-label">Description:</label>
        <input type="text" class="form-control" id="description" name="description"
            value="{{ professional.description }}" required>

        <label for="price" class="form-label">Service Price:</label>
        <input type="text" class="form-control" id="price" name="price" value="{{ professional.service_price }}"
            required>

        <label for="experience" class="form-label">Experience:</label>
        <input type="text" class="form-control" id="experience" name="experience" value="{{ professional.experience }}"
            required>
</div>
<div class="form-group text-center mt-3">
    <button type="submit" class="btn btn-primary">Confirm Change</button>
    <a href="{{ url_for('professional.professional_dashboard') }}" class="btn btn-secondary">Cancel</a>
</div>
<div class="form-group">
    <a href="{{ url_for('professionalprofessional_dashboard') }}" class="btn btn-primary ">Back to Dashboard</a>
</div>
</form>
{% endblock %}
