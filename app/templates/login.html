{% extends 'layout.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}
<form action="{{ url_for('auth.login') }}" class="form-group" method="post">
    <fieldset class="custom-fieldset">
        <legend class="text-center">
            <h1>LOGIN</h1>
        </legend>
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" required class="form-control custom-input">
        </div>
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" name="password" required class="form-control custom-input">
        </div>
        <div class="form-group text-center mt-3">
            <button type="submit" class="btn btn-primary">LOGIN</button>
        </div>
        <fieldset>
</form>
</div>
{% endblock %}
