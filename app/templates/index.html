<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Index</title>
</head>
<body>
  {% include 'navbar.html' with context %}
  {% include 'messages.html' with context %}
  <div class="container">
    <img src="{{ url_for('static', filename='images/lake-view.svg')}}" alt="lake">
    <p class="cursor typewriter-animation">Welcome to household services.Login or register to continue.</p>
  </div>
  <footer>
    <div id="footer">Created by Vanika Dangi || HouseHold service</div>
  </footer>
  <style>
    /* Ensure the container takes the full viewport height */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      box-sizing: border-box;
    }

    .container {
      position: relative;
      width: 100%;
      height: calc(100vh - 100px); /* Adjust the height to account for the footer */
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: flex-start; /* Align content to the left */
      align-content: flex-start;
      flex-wrap: nowrap;
      flex-direction: row;
    }

    /* Make the image responsive */
    .container img {
      max-width: 45%; /* Adjust width as needed */
      height: auto;
      object-fit: contain;
    }

    /* Google Fonts */
    @import url(https://fonts.googleapis.com/css?family=Anonymous+Pro);

    /* Cursor */
    .cursor{
        position: relative;
        width: 24em;
        margin: 0 auto;
        border-right: 2px solid rgba(255,255,255,.75);
        font-size: 30px;
        text-align: center;
        overflow: hidden;
        transform: translateY(-50%);
        white-space: nowrap; 
    }
    /* Animation */
    .typewriter-animation {
      animation: 
        typewriter 5s steps(50) 1s 1 normal both, 
        blinkingCursor 500ms steps(50) infinite normal;
    }
    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes blinkingCursor{
      from { border-right-color: rgba(255,255,255,.75); }
      to { border-right-color: transparent; }
    }


    footer {
      background-color: #343a40;
      color: #F2F2F2;
      font-size: 1.2rem;
      padding: 1.5rem;
      text-align: center;
    }
  </style>
</body>
</html>
